<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima В· Mobil Central</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .widget { text-align: center; padding: 1.5rem 2rem; width: 100%; }
    .icon { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .temp {
      font-size: clamp(2.8rem, 9vw, 4.8rem);
      font-weight: 200;
      letter-spacing: -2px;
      color: #111;
      line-height: 1;
    }
    .temp sup { font-size: 1.2rem; font-weight: 300; letter-spacing: 0; vertical-align: super; }
    .divider { width: 1.8rem; height: 1px; background: #ddd; margin: 0.9rem auto; }
    .desc { font-size: 0.73rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: #444; margin-bottom: 0.35rem; }
    .details { font-size: 0.6rem; letter-spacing: 0.14em; color: #999; margin-bottom: 0.3rem; }
    .meta { font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase; color: #bbb; }
    .range {
      display: inline-block;
      margin-top: 0.65rem;
      padding: 0.18rem 0.65rem;
      border: 1px solid #ebebeb;
      border-radius: 2rem;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="icon" id="icon">рҹҢӨпёҸ</div>
    <div class="temp"><span id="temp">--</span><sup>В°C</sup></div>
    <div class="divider"></div>
    <div class="desc" id="desc">Obteniendo datos...</div>
    <div class="details" id="details">Humedad В· Viento</div>
    <div class="meta">Santiago В· Chile</div>
    <div class="range" id="range">MГӯn -- В· MГЎx --</div>
  </div>
  <script>
    const WMO = {113:'вҳҖпёҸ',116:'вӣ…',119:'вҳҒпёҸ',122:'вҳҒпёҸ',143:'рҹҢ«пёҸ',176:'рҹҢҰпёҸ',179:'рҹҢЁпёҸ',182:'рҹҢ§пёҸ',185:'рҹҢ§пёҸ',200:'вӣҲпёҸ',227:'вқ„пёҸ',230:'вқ„пёҸ',248:'рҹҢ«пёҸ',260:'рҹҢ«пёҸ',263:'рҹҢҰпёҸ',266:'рҹҢҰпёҸ',293:'рҹҢҰпёҸ',296:'рҹҢҰпёҸ',299:'рҹҢ§пёҸ',302:'рҹҢ§пёҸ',305:'рҹҢ§пёҸ',308:'вӣҲпёҸ',317:'рҹҢЁпёҸ',320:'рҹҢЁпёҸ',323:'рҹҢЁпёҸ',326:'рҹҢЁпёҸ',329:'вқ„пёҸ',332:'вқ„пёҸ',335:'вқ„пёҸ',338:'вқ„пёҸ',350:'рҹҢ§пёҸ',353:'рҹҢҰпёҸ',356:'рҹҢ§пёҸ',359:'вӣҲпёҸ',362:'рҹҢЁпёҸ',365:'рҹҢЁпёҸ',368:'рҹҢЁпёҸ',371:'вқ„пёҸ',386:'вӣҲпёҸ',389:'вӣҲпёҸ',392:'вӣҲпёҸ',395:'вқ„пёҸ'};
    async function load() {
      try {
        const r = await fetch('https://wttr.in/Santiago?format=j1');
        const d = await r.json();
        const c = d.current_condition[0];
        const today = d.weather[0];
        document.getElementById('temp').textContent = c.temp_C;
        document.getElementById('icon').textContent = WMO[+c.weatherCode] || 'рҹҢӨпёҸ';
        const desc = c.lang_es?.[0]?.value || c.weatherDesc[0].value;
        document.getElementById('desc').textContent = desc;
        document.getElementById('details').textContent = `Humedad: ${c.humidity}%  В·  Viento: ${c.windspeedKmph} km/h`;
        document.getElementById('range').textContent = `MГӯn ${today.mintempC}В°  В·  MГЎx ${today.maxtempC}В°`;
      } catch(e) {
        document.getElementById('desc').textContent = 'Sin datos de clima';
        document.getElementById('temp').textContent = '--';
      }
    }
    load();
    setInterval(load, 600000);
  </script>
</body>
</html>
